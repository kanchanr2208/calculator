<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <section class="display">
                <p class="answer">Display Section</p>
            </section>
            <section class="buttons">
                <div class="numbers">
                    <div class="number"> 1 </div>
                    <div class="number"> 4 </div>
                    <div class="number"> 7 </div>
                    <div class="number adjacent"> . </div>
                    <div class="number"> 2 </div>
                    <div class="number"> 5 </div>
                    <div class="number"> 8 </div>
                    <div class="number"> 0 </div>
                    <div class="number"> 3 </div>
                    <div class="number"> 6 </div>
                    <div class="number"> 9 </div>
                    <div class="number .adjacent"> +/- </div>
                </div>
                <div class="operators">
                    <div class="plus operator"> + </div>
                    <div class="minus operator"> - </div>
                    <div class="multiply operator"> * </div>
                    <div class="divide operator"> / </div>
                </div>
                <div class="actions">
                    <div class="equals action"> = </div>
                    <div class="clear action"> CLR </div>
                    <div class="back action"> Back </div>
                </div>
            </section>
        </div>

    </div>
</body>
</html>
