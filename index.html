<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <p class="message">FU. Cleared the Board & Wiped the Memory.</p>
        <div class="calculator">
            <section class="displayContainer">
                <p class="display"></p>
            </section>
            <section class="buttons">
                <div class="numbers">
                    <div class="number one">1</div>
                    <div class="number four">4</div>
                    <div class="number seven">7</div>
                    <div class="decimal">.</div>
                    <div class="number two">2</div>
                    <div class="number five">5</div>
                    <div class="number eight">8</div>
                    <div class="number zero">0</div>
                    <div class="number three">3</div>
                    <div class="number six">6</div>
                    <div class="number nine">9</div>
                    <div class="negative">+/-</div>
                </div>
                <div class="operators">
                    <div class="plus operator">+</div>
                    <div class="minus operator">-</div>
                    <div class="multiply operator">*</div>
                    <div class="divide operator">/</div>
                </div>
                <div class="actions">
                    <div class="equals action">=</div>
                    <div class="clear action">CLR</div>
                    <div class="back action">Back</div>
                </div>
            </section>
        </div>

    </div>
</body>
</html>
